# 应用配置
app:
  name: FG-ABYSS
  version: 1.0.0
  env: development
  company: FG-ABYSS Team
  description: FG-ABYSS Application

# 服务器配置
server:
  port: 9245
  host: localhost
  debug: true

# 数据库配置
database:
  driver: sqlite
  path: data/app.db
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# 日志配置
log:
  level: debug
  format: json
  output: stdout
  file_path: logs/app.log

# 功能开关
features:
  dev_mode: true
  debug_menu: true
  hot_reload: true
